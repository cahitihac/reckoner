<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>

  <!-- Receipt body -->
  <rect x="28" y="14" width="44" height="48" rx="5" fill="white" opacity="0.97"/>
  <!-- Zigzag / torn bottom of receipt -->
  <polygon
    points="28,62 34,57 40,62 46,57 52,62 58,57 64,62 70,57 72,62 72,66 28,66"
    fill="white" opacity="0.97"/>

  <!-- Lines on receipt representing items -->
  <rect x="35" y="23" width="18" height="3" rx="1.5" fill="#6366f1" opacity="0.7"/>
  <rect x="35" y="30" width="30" height="3" rx="1.5" fill="#6366f1" opacity="0.5"/>
  <rect x="35" y="37" width="24" height="3" rx="1.5" fill="#6366f1" opacity="0.5"/>
  <!-- Divider -->
  <rect x="35" y="44" width="30" height="1.5" rx="0.75" fill="#6366f1" opacity="0.3"/>
  <!-- Total line -->
  <rect x="35" y="49" width="14" height="3" rx="1.5" fill="#4f46e5" opacity="0.9"/>
  <rect x="53" y="49" width="12" height="3" rx="1.5" fill="#4f46e5" opacity="0.9"/>

  <!-- Split stem -->
  <line x1="50" y1="66" x2="50" y2="73" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Fork left -->
  <line x1="50" y1="73" x2="33" y2="83" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Fork right -->
  <line x1="50" y1="73" x2="67" y2="83" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Left person circle -->
  <circle cx="29" cy="87" r="6.5" fill="white" opacity="0.9"/>
  <!-- Right person circle -->
  <circle cx="71" cy="87" r="6.5" fill="white" opacity="0.9"/>

  <!-- Left arrowhead dot -->
  <circle cx="33" cy="83" r="2" fill="white"/>
  <!-- Right arrowhead dot -->
  <circle cx="67" cy="83" r="2" fill="white"/>
</svg>
